<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskPro - Cloud Sync</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700&display=swap" rel="stylesheet">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/animaciones.css">
    <link rel="stylesheet" href="css/main.css">
</head>
<body>
    <!-- Efectos de fondo estilo video -->
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>

    <div class="app-container">
        <!-- Tarjeta principal con el efecto de borde gradiente -->
        <main class="neon-card">
            <header>
                <div class="header-title">
                    <i class='bx bx-cloud-lightning glow-icon'></i>
                    <h1>TaskPro</h1>
                </div>
                <p>Sincronización en la nube mediante Supabase.</p>
            </header>

            <section class="task-input-section">
                <div class="input-glass-wrapper">
                    <input type="text" id="task-input" placeholder="¿Qué vamos a hacer hoy?" aria-label="Nueva tarea">
                    <button id="btn-add" class="btn-neon" aria-label="Añadir tarea">
                        <i class='bx bx-send'></i>
                    </button>
                </div>
            </section>

            <section class="task-list-section">
                <div class="list-header">
                    <h3>Tus Tareas</h3>
                    <span id="sync-status" class="sync-status"><i class='bx bx-check-circle'></i> Sincronizado</span>
                </div>
                <ul id="task-list" class="task-list">
                    <!-- Tareas inyectadas con JS -->
                    <li class="loading-text">Cargando desde Supabase...</li>
                </ul>
            </section>
        </main>
    </div>

    <div id="toast-container"></div>

    <!-- Script como módulo para poder importar Supabase -->
    <script type="module" src="js/main.js"></script>
</body>
</html>
